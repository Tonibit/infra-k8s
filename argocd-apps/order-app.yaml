apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/Tonibit/infra-k8s.git
    targetRevision: HEAD
    path: k8s-overlays/order-service
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated: {}
